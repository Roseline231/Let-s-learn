<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
   <div class="bg image">
    <div class="content">
        <header>Login Here</header>
        <form action="#">
            <div class="field">
                <i class="fa-user"></i>
                <input type="text" placeholder="ENter Email or Phone " required>
            </div>
            <div class="field Space">
                <i class="fa lock"></i>
                <input type="password" class=" passkey " placeholder="Enter password" required />
                <span class="show">SHOW</span>
            </div >
            <div class="pass">
                <a href="#">Forgot Passwaord</a>
            </div>
            <div class="field">
                <input type="Submit" value="Login">
            </div>
        </form>
        <div class="Login">Or Login with </div>
        <div class="links">
            <div class="facebook">
                <i class="fa fa-facebook" > <span>Facebook</span></i>
            </div>
            <div class="gmail">
                <i class="fa fa-envelope"> <span>G- Mail</span></i>
                <div class="signup"> Don't have an account? <a href="#">Signup Now</a>

                </div>
            </div>
        </div>

    </div>

   </div> 
</body>
</html>
